<!DOCTYPE html>
<html lang="en">

<!-- 
    StudySpot - A Productivity App
    This is the main HTML file that creates the structure of our study app
    It includes a clock, pomodoro timer, music player, and todo list
-->

<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Spot</title>

    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />

    <!-- Font loading for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Warm up SoundCloud connections early — the widget script and iframe
         are injected late by js/music.js, so without these the TCP/TLS
         handshakes don't start until after all local scripts parse. -->
    <link rel="preconnect" href="https://w.soundcloud.com" crossorigin>
    <link rel="preconnect" href="https://api-widget.soundcloud.com" crossorigin>
    <link rel="dns-prefetch" href="https://i1.sndcdn.com">
    <link rel="preload" href="https://w.soundcloud.com/player/api.js" as="script" crossorigin>
    <!-- Inter font from Google Fonts.
         display=optional avoids font-swap CLS: if Inter isn't ready in ~100ms the
         system fallback is kept for this paint, and Inter takes over on the next
         visit (cached). display=swap would always swap and reflow text. -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=optional"
        rel="stylesheet">

    <!-- Our custom styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Video background layer (used when a video background is selected) -->
    <video id="bg-video" class="bg-video" autoplay muted loop playsinline></video>

    <!-- Main container that holds everything -->
    <div class="main-wrapper">
        <!-- App name/logo - positioned independently -->
        <div id="title">StudySpot</div>
        
        <div class="container">
            <!-- Left side: Current time and quote -->
            <div class="left-section">
                <!-- Current time and motivational quote -->
                <div class="center-display">
                    <h1 id="clock">12:00</h1>
                    <h3 id="quote">"Strive for progress, not perfection"</h3>
                </div>
            </div>

            <!-- Right side: All the productivity tools -->
            <div class="right-section">
                <!-- Pomodoro Timer Section -->
                <div class="pomodoro-timer">
                    <!-- Left side of timer: display and controls -->
                    <div class="timer-left">
                        <h2 id="time">25:00</h2>
                        <div class="timer-controls">
                            <button id="start">Start</button>
                            <!-- Timer Settings-->
                            <div class="timer-setting">
                                <button id="timer-setting"><img src="assets/icons/timer_settings.svg" alt="timer setting"></button>
                                <!-- Timer settings dropdown menu -->
                                <div class="dropdown dropdown--large timer-settings-dropdown">
                                    <div class="timer-option" data-timer="pomodoro">
                                        <span class="timer-name">Pomodoro</span>
                                        <div class="timer-input-container">
                                            <input type="number" class="timer-input" value="25" min="1" max="120" data-timer="pomodoro">
                                            <span class="timer-unit">min</span>
                                        </div>
                                    </div>
                                    <div class="timer-option" data-timer="short-break">
                                        <span class="timer-name">Short Break</span>
                                        <div class="timer-input-container">
                                            <input type="number" class="timer-input" value="5" min="1" max="60" data-timer="short-break">
                                            <span class="timer-unit">min</span>
                                        </div>
                                    </div>
                                    <div class="timer-option" data-timer="long-break">
                                        <span class="timer-name">Long Break</span>
                                        <div class="timer-input-container">
                                            <input type="number" class="timer-input" value="15" min="1" max="120" data-timer="long-break">
                                            <span class="timer-unit">min</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Divider line between timer sections -->
                    <hr id="vertical-line">
                    
                    <!-- Right side of timer: mode selection buttons -->
                    <div class="timer-right">
                        <button id="pomodoro" class="active">Pomodoro</button>
                        <button id="short-break">Short Break</button>
                        <button id="long-break">Long Break</button>
                    </div>

                </div>
                
               <!-- Music Player Section -->
                <div class="music-section">
                    <!-- Main music player with song info and controls -->
                    <div class="music-player">
                        <!-- SoundCloud player UI -->
                        <div class="player-soundcloud">
                            <img src="assets/images/lofi.png" alt="Lofi Girl" class="track-thumbnail" />

                            <div class="track-details">
                                <h4>Lofi Girl <br> Lofi music</h4>
                                <div class="track-controls">
                                    <button id="prev"><img src="assets/icons/prev.svg" alt="Previous" /></button>
                                    <button id="play"><img src="assets/icons/play.svg" alt="Play" /></button>
                                    <button id="next"><img src="assets/icons/next.svg" alt="Next" /></button>
                                </div>
                            </div>
                        </div>

                        <!-- Spotify embed (loaded on demand) -->
                        <div class="player-spotify" hidden>
                            <iframe id="spotify-embed" title="Spotify player" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture; web-share" allowtransparency="true"></iframe>
                        </div>

                        <!-- Spotify mode: slim always-visible input bar below the embed.
                             Single discoverable control — paste a link, hit Enter or Load. -->
                        <div class="spotify-input-bar" hidden>
                            <svg class="spotify-input-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12C24 5.4 18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.84-.179-.96-.6-.122-.421.179-.84.601-.96 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.141zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.299.421-1.02.599-1.559.3z"/>
                            </svg>
                            <input type="text" id="spotify-link-input" class="spotify-link-input" placeholder="Paste a Spotify playlist link to use your own" spellcheck="false" autocomplete="off" />
                            <button id="spotify-link-load" class="spotify-link-load" type="button">Load</button>
                        </div>
                    </div>

                    <!-- Music preference buttons (SoundCloud only — Spotify uses the inline bar above) -->
                    <div class="music-taste">
                        <!-- SoundCloud picker -->
                        <div class="taste-group taste-soundcloud">
                            <div class="mood-container">
                                <button id="mood" title="Pick a mood"><img src="assets/icons/mood.svg" alt="select mood"></button>
                                <div class="dropdown dropdown--medium mood-dropdown">
                                    <button class="mood-option" data-mood="focus">Focus</button>
                                </div>
                            </div>
                            <div class="genre-container">
                                <button id="genre" title="Pick a genre"><img src="assets/icons/sound.svg" alt="select sound"></button>
                                <div class="dropdown dropdown--medium genre-dropdown">
                                    <button class="genre-option active" data-genre="jazz">Jazz</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Todo List Section -->
                <div class="todo-list">
                    <!-- Header with add task button -->
                    <div class="todo-header">
                        <button id="add-task">
                            <span>+</span>
                            Add New Task
                        </button>
                        <!-- Separator line below add task button -->
                        <hr class="task-separator">
                    </div>
                    
                    <!-- Container for all todo items -->
                    <div class="todo-items">
                        <!-- Sample task 1 (can be deleted).
                             The .task-drag-handle span is also injected by
                             tasks.js on boot for any todo-item that lacks
                             one, so older saved markup keeps working. -->
                        <div class="todo-item" data-depth="0">
                            <span class="task-drag-handle" aria-label="Drag to reorder">
                                <svg viewBox="0 0 8 14" fill="currentColor" aria-hidden="true">
                                    <circle cx="2" cy="2" r="1"/><circle cx="6" cy="2" r="1"/>
                                    <circle cx="2" cy="7" r="1"/><circle cx="6" cy="7" r="1"/>
                                    <circle cx="2" cy="12" r="1"/><circle cx="6" cy="12" r="1"/>
                                </svg>
                            </span>
                            <input type="checkbox" id="task1" class="task-checkbox">
                            <span class="task-label">Task</span>
                            <button class="delete-btn" aria-label="Delete task">×</button>
                        </div>

                        <!-- Sample task 2 (can be deleted) -->
                        <div class="todo-item" data-depth="0">
                            <span class="task-drag-handle" aria-label="Drag to reorder">
                                <svg viewBox="0 0 8 14" fill="currentColor" aria-hidden="true">
                                    <circle cx="2" cy="2" r="1"/><circle cx="6" cy="2" r="1"/>
                                    <circle cx="2" cy="7" r="1"/><circle cx="6" cy="7" r="1"/>
                                    <circle cx="2" cy="12" r="1"/><circle cx="6" cy="12" r="1"/>
                                </svg>
                            </span>
                            <input type="checkbox" id="task2" class="task-checkbox" checked>
                            <span class="task-label">Completed Task</span>
                            <button class="delete-btn" aria-label="Delete task">×</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Bottom section with stats, background picker and fullscreen buttons -->
        <div class="bottom-section">
            <!-- Source switcher (SoundCloud / Spotify) -->
            <div class="music-source-toggle" role="tablist" aria-label="Music source">
                <button class="source-option active" data-source="soundcloud" role="tab" aria-selected="true" title="Play from SoundCloud">
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M7 17V8.5a4.5 4.5 0 0 1 8.94-.78A3.5 3.5 0 0 1 20.5 11.5a3.5 3.5 0 0 1-3.5 3.5h-1v2H7zM5 17H3v-5h2v5zm-3 0H1v-3h1v3z"/>
                    </svg>
                    <span>SoundCloud</span>
                </button>
                <button class="source-option" data-source="spotify" role="tab" aria-selected="false" title="Play from Spotify">
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12C24 5.4 18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.84-.179-.96-.6-.122-.421.179-.84.601-.96 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.141zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.299.421-1.02.599-1.559.3z"/>
                    </svg>
                    <span>Spotify</span>
                </button>
            </div>
            <div class="background-container">
                <button id="background-btn" title="Change background"><img src="assets/icons/background.svg"
                        alt="change background"></button>
                <!-- Background picker dropdown (populated by background.js) -->
                <div class="dropdown dropdown--up background-dropdown"></div>
            </div>
            <button id="stats-btn" class="stats-button"><img src="assets/icons/stats.svg"
                    alt="study stats"></button>
            <button id="edit-layout-btn" title="Customize layout" aria-pressed="false">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="5 9 2 12 5 15"/>
                    <polyline points="9 5 12 2 15 5"/>
                    <polyline points="15 19 12 22 9 19"/>
                    <polyline points="19 9 22 12 19 15"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <line x1="12" y1="2" x2="12" y2="22"/>
                </svg>
            </button>
            <div class="layout-edit-controls" aria-hidden="true">
                <button id="save-layout-btn" title="Save current layout to a slot — then click 1, 2, or 3" aria-pressed="false" tabindex="-1">Save</button>
                <button class="layout-preset-btn" data-preset="1" title="Layout 1 — Centered tower" tabindex="-1">1</button>
                <button class="layout-preset-btn" data-preset="2" title="Layout 2 — Compact 2×2" tabindex="-1">2</button>
                <button class="layout-preset-btn" data-preset="3" title="Layout 3 — Bottom bar" tabindex="-1">3</button>
                <button id="reset-layout-btn" title="Reset layout to default" tabindex="-1">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="3 4 3 10 9 10"/>
                        <path d="M3.51 14.5A9 9 0 1 0 6 5.3L3 8"/>
                    </svg>
                </button>
                <button id="done-layout-btn" title="Done editing layout" tabindex="-1">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="5 12 10 17 19 7"/>
                    </svg>
                </button>
            </div>
            <button class="full-screen"><img src="assets/icons/fullscreen.svg"
                    alt="change to full full-screen"></button>
        </div>
        <div class="design-credit" aria-label="Site credit">Design by Selena</div>
        
        
        <!-- JavaScript files - Load in the right order! -->
        <!-- Load modules first, then initialize the app -->
        <script src="js/stats.js"></script>     <!-- Study stats tracking -->
        <script src="js/timer.js"></script>     <!-- Pomodoro timer functionality -->
        <script src="js/tasks.js"></script>     <!-- Todo list functionality -->
        <script src="js/clock.js"></script>     <!-- Real-time clock display -->
        <script src="js/music.js"></script>     <!-- Music player functionality -->
        <script src="js/background.js"></script><!-- Background picker -->
        <script src="js/quotes.js"></script>    <!-- Hourly quote rotation -->
        <script src="js/layout.js"></script>    <!-- Drag/resize utility blocks -->
        <script src="js/intro-hint.js"></script><!-- First-visit fullscreen hint -->
        <script src="js/stats-hint.js"></script><!-- First-pomodoro stats hint -->
        <script src="js/bg-hint.js"></script>   <!-- First-fullscreen background hint -->
        <script src="js/layout-hint.js"></script><!-- Layout hint chained after bg hint -->
        <script src="js/spotify-hint.js"></script><!-- Spotify hint chained after stats hint -->
        <script src="js/main.js"></script>      <!-- Starts everything up -->

        <!-- Vercel Analytics -->
        <script>
            window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
        </script>
        <script defer src="/_vercel/insights/script.js"></script>

        <!-- Vercel Speed Insights -->
        <script>
            window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
        </script>
        <script defer src="/_vercel/speed-insights/script.js"></script>
    </div>
</body>

</html>
